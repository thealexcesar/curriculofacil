<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currículo Fácil</title>
  <meta name="description" content="">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Currículo Fácil">
  <meta property="og:description" content="">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Currículo Fácil">
  <link rel="canonical" href="https://thealexcesar.github.io/curriculofacil/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"></noscript>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <header class="app-header no-print">
    <div class="app-header-content">
      <img src="assets/icons/logo.svg" alt="Currículo Fácil" class="app-logo" width="280" height="60">
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="pt-BR" data-i18n-lang="languages.portuguese">
          <span class="lang-short">PT</span>
          <span class="lang-full"></span>
        </button>
        <button class="lang-btn" data-lang="en" data-i18n-lang="languages.english">
          <span class="lang-short">EN</span>
          <span class="lang-full"></span>
        </button>
        <button class="lang-btn" data-lang="de" data-i18n-lang="languages.german">
          <span class="lang-short">DE</span>
          <span class="lang-full"></span>
        </button>
      </div>
    </div>
    <p class="app-subtitle" data-i18n="app.subtitle"></p>
  </header>

  <nav class="steps-nav no-print">
    <div class="step-item" data-step="1">
      <span class="step-number">1</span>
      <span class="step-label" data-i18n="nav.step.1"></span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="2">
      <span class="step-number">2</span>
      <span class="step-label" data-i18n="nav.step.2"></span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="3">
      <span class="step-number">3</span>
      <span class="step-label" data-i18n="nav.step.3"></span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="4">
      <span class="step-number">4</span>
      <span class="step-label" data-i18n="nav.step.4"></span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="5">
      <span class="step-number">5</span>
      <span class="step-label" data-i18n="nav.step.5"></span>
    </div>
  </nav>

  <div class="view-toggle no-print">
    <button class="view-btn view-btn--active" id="toggle-form" data-i18n="toggle.form"></button>
    <button class="view-btn" id="toggle-preview" data-i18n="toggle.preview"></button>
  </div>

  <div class="layout">
    <div class="form-panel no-print">

      <section id="step-1" class="step-section active">
        <h2 class="section-title" data-i18n="section.personal"></h2>

        <div class="field">
          <label for="name" data-i18n="field.name.label"></label>
          <input type="text" id="name" data-i18n-placeholder="field.name.placeholder" autocomplete="name">
          <span class="field-hint" id="name-hint"></span>
        </div>

        <div class="field">
          <label for="job-title" data-i18n="field.jobTitle.label"></label>
          <input type="text" id="job-title" data-i18n-placeholder="field.jobTitle.placeholder" autocomplete="organization-title">
          <span class="field-hint" id="job-title-hint"></span>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="email" data-i18n="field.email.label"></label>
            <input type="email" id="email" data-i18n-placeholder="field.email.label" autocomplete="email">
            <span class="field-hint" id="email-hint"></span>
          </div>
          <div class="field">
            <label data-i18n="field.phone.label"></label>
            <div class="phone-entry">
              <input type="tel" id="phone" data-i18n-placeholder="field.phone.placeholder" autocomplete="tel">
              <label class="checkbox-label" title="WhatsApp">
                <input type="checkbox" id="phone-whatsapp">
                <img src="assets/icons/whatsapp.svg" class="whatsapp-icon" alt="WhatsApp">
              </label>
            </div>
            <span class="field-hint" id="phone-hint"></span>
            <div id="extra-phones"></div>
            <button type="button" class="btn-add-small" id="add-phone">
              <span class="material-symbols-outlined" aria-hidden="true">add</span>
              <span data-i18n="btn.add" data-i18n-item="field.phone.label"></span>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="location" data-i18n="field.location.label"></label>
          <input type="text" id="location" data-i18n-placeholder="field.location.placeholder" autocomplete="address-level2">
        </div>

        <div class="field">
          <label for="linkedin" data-i18n="field.linkedin.label"></label>
          <input type="text" id="linkedin" data-i18n-placeholder="field.linkedin.placeholder" autocomplete="off">
        </div>
      </section>

      <section id="step-2" class="step-section">
        <h2 class="section-title" data-i18n="section.profile"></h2>
        <div class="field">
          <label for="profile" data-i18n="field.profile.label"></label>
          <textarea id="profile" rows="8" data-i18n-placeholder="field.profile.placeholder"></textarea>
          <div class="char-counter">
            <span id="profile-count">0</span>/400
          </div>
          <span class="field-hint" id="profile-hint"></span>
        </div>
      </section>

      <section id="step-3" class="step-section">
        <h2 class="section-title" data-i18n="section.experience"></h2>
        <div id="experience-list"></div>
        <button type="button" class="btn-add-small" id="add-experience">
          <span class="material-symbols-outlined" aria-hidden="true">add</span>
          <span data-i18n="btn.add" data-i18n-item="section.experience"></span>
        </button>
      </section>

      <section id="step-4" class="step-section">
        <h2 class="section-title" data-i18n="section.education"></h2>
        <div id="education-list"></div>
        <button type="button" class="btn-add-small" id="add-education">
          <span class="material-symbols-outlined" aria-hidden="true">add</span>
          <span data-i18n="btn.add" data-i18n-item="section.education"></span>
        </button>
      </section>

      <section id="step-5" class="step-section">
        <h2 class="section-title" data-i18n="section.skills"></h2>

        <div id="skill-section">
          <h3 class="section-subtitle" data-i18n="section.skill"></h3>
        </div>

        <div id="language-section">
          <h3 class="section-subtitle" data-i18n="section.language"></h3>
          <div id="language-list"></div>
          <button type="button" class="btn-add-small" id="add-language">
            <span class="material-symbols-outlined" aria-hidden="true">add</span>
            <span data-i18n="btn.add" data-i18n-item="section.language"></span>
          </button>
        </div>
      </section>

      <div class="form-nav">
        <button class="btn btn-secondary" id="prev-btn" disabled>
          <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
          <span data-i18n="btn.prev"></span>
        </button>
        <button class="btn btn-primary" id="next-btn">
          <span data-i18n="btn.next"></span>
          <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
        </button>
        <button class="btn btn-success" id="finish-btn" style="display:none">
          <span class="material-symbols-outlined" aria-hidden="true">check</span>
          <span data-i18n="btn.finish"></span>
        </button>
      </div>
    </div>

    <div class="preview-panel">
      <div class="preview-header no-print">
        <span class="preview-label" data-i18n="preview.label"></span>
        <button class="btn btn-primary btn-sm" id="print-btn">
          <span class="material-symbols-outlined" aria-hidden="true">print</span>
          <span data-i18n="btn.print"></span>
        </button>
      </div>
      <div class="cv-preview-wrapper">
        <div id="cv-preview" class="cv-preview">
          <p class="preview-empty" data-i18n="preview.empty"></p>
        </div>
      </div>
    </div>

  </div>
</div>
<script type="module" src="js/app.js"></script>
<script>
  document.fonts.ready.then(() => {
    document.body.classList.add('fonts-loaded');
  });
</script>
</body>
</body>
</html>
