<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currículo Fácil</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <header class="app-header no-print">
    <h1 class="app-title">Currículo Fácil</h1>
    <p class="app-subtitle">Crie um currículo profissional em minutos</p>
  </header>

  <nav class="steps-nav no-print">
    <div class="step-item" data-step="1">
      <span class="step-number">1</span>
      <span class="step-label">Pessoal</span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="2">
      <span class="step-number">2</span>
      <span class="step-label">Perfil</span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="3">
      <span class="step-number">3</span>
      <span class="step-label">Experiência</span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="4">
      <span class="step-number">4</span>
      <span class="step-label">Educação</span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="5">
      <span class="step-number">5</span>
      <span class="step-label">Habilidades</span>
    </div>
  </nav>

  <div class="layout">

    <div class="form-panel no-print">
      <section id="step-1" class="step-section active">
        <h2 class="section-title">Informações Pessoais</h2>

        <div class="field">
          <label for="name">Nome Completo *</label>
          <input type="text" id="name" placeholder="Ex: Maria da Silva" autocomplete="name">
          <span class="field-hint" id="name-hint"></span>
        </div>

        <div class="field">
          <label for="job-title">Título Profissional *</label>
          <input type="text" id="job-title" placeholder="Ex: Desenvolvedora Web" autocomplete="organization-title">
          <span class="field-hint" id="job-title-hint"></span>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="email">Email *</label>
            <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
            <span class="field-hint" id="email-hint"></span>
          </div>
          <div class="field">
            <label>Telefone *</label>
            <div class="phone-entry">
              <input type="tel" id="phone" placeholder="(00) 00000-0000" autocomplete="tel">
              <label class="checkbox-label" title="WhatsApp">
                <input type="checkbox" id="phone-whatsapp">
                <img src="assets/icons/whatsapp.svg" class="whatsapp-icon" alt="WhatsApp">
              </label>
            </div>
            <span class="field-hint" id="phone-hint"></span>
            <div id="extra-phones"></div>
            <button type="button" class="btn-add-small" id="add-phone">
              <span class="material-symbols-outlined">add</span> Adicionar telefone
            </button>
          </div>
        </div>

        <div class="field">
          <label for="location">Localização</label>
          <input type="text" id="location" placeholder="Ex: Blumenau, SC" autocomplete="address-level2">
        </div>

        <div class="field">
          <label for="linkedin">LinkedIn</label>
          <input type="text" id="linkedin" placeholder="https://linkedin.com/in/seuperfil" autocomplete="off">
        </div>
      </section>
      <section id="step-2" class="step-section">
        <h2 class="section-title">Perfil Profissional</h2>

        <div class="field">
          <label for="profile">Resumo Profissional</label>
          <textarea id="profile" rows="8" placeholder="Ex: Profissional com experiência em desenvolvimento web, focado em criar soluções eficientes e de qualidade. Tenho facilidade para trabalhar em equipe e busco sempre evoluir nas tecnologias que utilizo."></textarea>
          <div class="char-counter">
            <span id="profile-count">0</span>/400
          </div>
          <span class="field-hint" id="profile-hint"></span>
        </div>
      </section>
      <section id="step-3" class="step-section">
        <h2 class="section-title">Experiência Profissional</h2>
      </section>
      <section id="step-4" class="step-section">
        <h2 class="section-title">Educação</h2>
      </section>
      <section id="step-5" class="step-section">
        <h2 class="section-title">Habilidades e Idiomas</h2>
      </section>

      <div class="form-nav">
        <button class="btn btn-secondary" id="prev-btn" disabled>
          <span class="material-symbols-outlined">arrow_back</span> Anterior
        </button>
        <button class="btn btn-primary" id="next-btn">
          Próximo <span class="material-symbols-outlined">arrow_forward</span>
        </button>
        <button class="btn btn-success" id="finish-btn" style="display:none">
          <span class="material-symbols-outlined">check</span> Finalizar
        </button>
      </div>
    </div>

    <div class="preview-panel">
      <div class="preview-header no-print">
        <span class="preview-label">Visualização</span>
        <button class="btn btn-primary btn-sm" id="print-btn">
          <span class="material-symbols-outlined">print</span> Imprimir / PDF
        </button>
      </div>
      <div class="cv-preview-wrapper">
        <div id="cv-preview" class="cv-preview">
          <p class="preview-empty">Preencha as informações para visualizar o currículo</p>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="js/toast.js"></script>
<script src="js/navigation.js"></script>
<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/preview.js"></script>
<script src="js/validation.js"></script>
<script src="js/app.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
