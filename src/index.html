<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currículo Fácil</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <header class="app-header no-print">
    <h1 class="app-title" data-i18n="app.title"></h1>
    <p class="app-subtitle" data-i18n="app.subtitle"></p>
  </header>

  <nav class="steps-nav no-print">
    <div class="step-item" data-step="1">
      <span class="step-number">1</span>
      <span class="step-label" data-i18n="nav.step.1"></span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="2">
      <span class="step-number">2</span>
      <span class="step-label" data-i18n="nav.step.2"></span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="3">
      <span class="step-number">3</span>
      <span class="step-label" data-i18n="nav.step.3"></span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="4">
      <span class="step-number">4</span>
      <span class="step-label" data-i18n="nav.step.4"></span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" data-step="5">
      <span class="step-number">5</span>
      <span class="step-label" data-i18n="nav.step.5"></span>
    </div>
  </nav>

  <div class="layout">
    <div class="form-panel no-print">

      <section id="step-1" class="step-section active">
        <h2 class="section-title" data-i18n="section.personal"></h2>

        <div class="field">
          <label for="name" data-i18n="field.name.label"></label>
          <input type="text" id="name" data-i18n-placeholder="field.name.placeholder" autocomplete="name">
          <span class="field-hint" id="name-hint"></span>
        </div>

        <div class="field">
          <label for="job-title" data-i18n="field.jobTitle.label"></label>
          <input type="text" id="job-title" data-i18n-placeholder="field.jobTitle.placeholder" autocomplete="organization-title">
          <span class="field-hint" id="job-title-hint"></span>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="email" data-i18n="field.email.label"></label>
            <input type="email" id="email" data-i18n-placeholder="field.email.label" autocomplete="email">
            <span class="field-hint" id="email-hint"></span>
          </div>
          <div class="field">
            <label data-i18n="field.phone.label"></label>
            <div class="phone-entry">
              <input type="tel" id="phone" data-i18n-placeholder="field.phone.placeholder" autocomplete="tel">
              <label class="checkbox-label" title="WhatsApp">
                <input type="checkbox" id="phone-whatsapp">
                <img src="assets/icons/whatsapp.svg" class="whatsapp-icon" alt="WhatsApp">
              </label>
            </div>
            <span class="field-hint" id="phone-hint"></span>
            <div id="extra-phones"></div>
            <button type="button" class="btn-add-small" id="add-phone">
              <span class="material-symbols-outlined">add</span>
              <span data-i18n="btn.add.phone"></span>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="location" data-i18n="field.location.label"></label>
          <input type="text" id="location" data-i18n-placeholder="field.location.placeholder" autocomplete="address-level2">
        </div>

        <div class="field">
          <label for="linkedin" data-i18n="field.linkedin.label"></label>
          <input type="text" id="linkedin" data-i18n-placeholder="field.linkedin.placeholder" autocomplete="off">
        </div>
      </section>

      <section id="step-2" class="step-section">
        <h2 class="section-title" data-i18n="section.profile"></h2>
        <div class="field">
          <label for="profile" data-i18n="field.profile.label"></label>
          <textarea id="profile" rows="8" data-i18n-placeholder="field.profile.placeholder"></textarea>
          <div class="char-counter">
            <span id="profile-count">0</span>/400
          </div>
          <span class="field-hint" id="profile-hint"></span>
        </div>
      </section>

      <section id="step-3" class="step-section">
        <h2 class="section-title" data-i18n="section.experience"></h2>
        <div id="experience-list"></div>
        <button type="button" class="btn-add-small" id="add-experience">
          <span class="material-symbols-outlined">add</span>
          <span data-i18n="btn.add.experience"></span>
        </button>
      </section>

      <section id="step-4" class="step-section">
        <h2 class="section-title" data-i18n="section.education"></h2>
        <div id="education-list"></div>
        <button type="button" class="btn-add-small" id="add-education">
          <span class="material-symbols-outlined">add</span>
          <span data-i18n="btn.add.education"></span>
        </button>
      </section>

      <section id="step-5" class="step-section">
        <h2 class="section-title" data-i18n="section.skills"></h2>
      </section>

      <div class="form-nav">
        <button class="btn btn-secondary" id="prev-btn" disabled>
          <span class="material-symbols-outlined">arrow_back</span>
          <span data-i18n="btn.prev"></span>
        </button>
        <button class="btn btn-primary" id="next-btn">
          <span data-i18n="btn.next"></span>
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
        <button class="btn btn-success" id="finish-btn" style="display:none">
          <span class="material-symbols-outlined">check</span>
          <span data-i18n="btn.finish"></span>
        </button>
      </div>
    </div>

    <div class="preview-panel">
      <div class="preview-header no-print">
        <span class="preview-label" data-i18n="preview.label"></span>
        <button class="btn btn-primary btn-sm" id="print-btn">
          <span class="material-symbols-outlined">print</span>
          <span data-i18n="btn.print"></span>
        </button>
      </div>
      <div class="cv-preview-wrapper">
        <div id="cv-preview" class="cv-preview">
          <p class="preview-empty" data-i18n="preview.empty"></p>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
